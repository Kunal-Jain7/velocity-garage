services:
  # ── Development ──────────────────────────────────────
  # Builds locally from source with hot reload
  velocity-garage-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: velocity-garage-dev
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    profiles: ['dev']

  # ── Production ───────────────────────────────────────
  # Uses a pre-built image transferred by Jenkins (docker save/load).
  # The image tag 'velocity-garage:latest' must already exist on the
  # host before running: docker compose --profile prod up -d
  velocity-garage:
    image: velocity-garage:latest
    container_name: velocity-garage
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles: ['prod']

  # ── Nginx reverse proxy (production) ─────────────────
  nginx:
    image: nginx:alpine
    container_name: velocity-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - velocity-garage
    restart: unless-stopped
    profiles: ['prod']
